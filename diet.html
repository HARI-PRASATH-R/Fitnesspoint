<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diet Chat</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
  }

  body {
    height: 100vh;
    background: url('IMAGE/mainimg.jpg') no-repeat center center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .chat-container {
    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    width: 100%;
    max-width: 400px;
    height: 80vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    overflow: hidden;
  }

  .chat-header {
    padding: 15px;
    background: rgba(0,0,0,0.3);
    color: #fff;
    text-align: center;
    font-weight: bold;
    font-size: 18px;
  }

  .chat-body {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .message {
    max-width: 80%;
    padding: 10px;
    border-radius: 10px;
    animation: fadeIn 0.3s ease;
    font-size: 14px;
    line-height: 1.4;
  }

  .bot-message {
    background: rgba(255, 255, 255, 0.8);
    align-self: flex-start;
  }

  .user-message {
    background: #28a745;
    color: white;
    align-self: flex-end;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .chat-footer {
    display: flex;
    border-top: 1px solid rgba(255,255,255,0.2);
  }

  .chat-footer input {
    flex: 1;
    padding: 12px;
    border: none;
    outline: none;
    font-size: 14px;
    background: rgba(255, 255, 255, 0.9);
  }

  .chat-footer button {
    background: #28a745;
    color: white;
    border: none;
    padding: 0 20px;
    cursor: pointer;
    transition: background 0.3s ease;
  }

  .chat-footer button:hover {
    background: #218838;
  }
</style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">💬 Diet Chat Assistant</div>
  
  <div class="chat-body" id="chatBody">
    <div class="message bot-message">
      Hi! I’m your diet assistant. Tell me your fitness goal (weight loss, muscle gain, maintenance) and I’ll suggest a plan.
    </div>
  </div>
  
  <div class="chat-footer">
    <input type="text" id="userInput" placeholder="Type your message...">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
function sendMessage() {
  let input = document.getElementById('userInput');
  let text = input.value.trim();
  if (text === "") return;

  appendMessage(text, 'user');

  setTimeout(() => {
    let reply = getBotReply(text);
    appendMessage(reply, 'bot');
  }, 800);

  input.value = "";
}

function appendMessage(text, sender) {
  let chatBody = document.getElementById('chatBody');
  let msg = document.createElement('div');
  msg.classList.add('message', sender === 'user' ? 'user-message' : 'bot-message');
  msg.textContent = text;
  chatBody.appendChild(msg);
  chatBody.scrollTop = chatBody.scrollHeight;
}

function getBotReply(userText) {
  userText = userText.toLowerCase();
  if (userText.includes("weight loss")) {
    return "For weight loss, aim for a calorie deficit with high protein and moderate carbs. Include veggies in every meal.";
  } 
  else if (userText.includes("muscle gain")) {
    return "For muscle gain, increase protein intake (1.6–2.2g/kg bodyweight) and eat in a slight calorie surplus.";
  }
  else if (userText.includes("maintenance")) {
    return "For maintenance, keep your calorie intake equal to your TDEE, and balance macros with 40% carbs, 30% protein, 30% fats.";
  }
  else {
    return "I can help with diet plans for weight loss, muscle gain, or maintenance. Which one are you aiming for?";
  }
}
</script>

</body>
</html>
