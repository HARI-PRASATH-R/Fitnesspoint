<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gym Registration</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
  }

  body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px; 
    background: url('IMAGE/mainimg.jpg') no-repeat center center/cover;
  }

  .register-box {
    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 30px;
    width: 100%;
    max-width: 420px;
    animation: fadeInUp 1s ease;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    overflow: hidden;
  }

  @keyframes fadeInUp {
    0% {
      transform: translateY(40px);
      opacity: 0;
    }
    100% {
      transform: translateY(0);
      opacity: 1;
    }
  }

  h2 {
    text-align: center;
    margin-bottom: 25px;
    color: #fff;
    font-size: 28px;
    letter-spacing: 1px;
  }

  .input-group {
    position: relative;
    margin-bottom: 20px;
    animation: slideIn 0.6s ease forwards;
    opacity: 0;
  }

  @keyframes slideIn {
    from {
      transform: translateY(20px);
      opacity: 0;
    }
    to {
      transform: translateY(0);
      opacity: 1;
    }
  }

  .input-group label {
    position: absolute;
    top: 50%;
    left: 12px;
    transform: translateY(-50%);
    color: #222;
    font-weight: bold;
    pointer-events: none;
    transition: 0.3s ease;
    font-size: 14px;
  }

  .input-group input,
  .input-group select {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    background: rgba(255, 255, 255, 0.9);
    outline: none;
    transition: all 0.3s ease;
  }

  .input-group input:focus,
  .input-group select:focus {
    box-shadow: 0 0 10px rgba(13, 14, 13, 0.5);
  }

  .input-group input:focus + label,
  .input-group input:not(:placeholder-shown) + label,
  .input-group select:focus + label,
  .input-group select:not([value=""]) + label {
    top: -8px;
    left: 8px;
    background: rgba(255,255,255,0.9);
    padding: 2px 6px;
    font-size: 12px;
    color: #141414;
    border-radius: 4px;
  }

  button {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #28a745, #1e7e34);
    color: white;
    border: none;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s ease;
    letter-spacing: 0.5px;
  }

  button:hover {
    background: linear-gradient(135deg, #218838, #19692c);
    transform: scale(1.03);
    box-shadow: 0 8px 20px rgba(33,136,56,0.4);
  }

  @media (max-width: 500px) {
    h2 {
      font-size: 22px;
    }
    .register-box {
      padding: 20px;
    }
  }
</style>
</head>
<body>

  <div class="register-box">
    <h2>Gym Registration</h2>
    <form>
      <div class="input-group" style="animation-delay: 0.1s">
        <input type="text" placeholder=" " required>
        <label>Full Name</label>
      </div>

      <div class="input-group" style="animation-delay: 0.2s">
        <input type="email" placeholder=" " required>
        <label>Email</label>
      </div>

      <div class="input-group" style="animation-delay: 0.3s">
        <input type="tel" placeholder=" " required>
        <label>Phone</label>
      </div>

      <div class="input-group" style="animation-delay: 0.4s">
        <select required>
          <option value="" disabled selected hidden></option>
          <option value="Monthly">Monthly</option>
          <option value="Quarterly">Quarterly</option>
          <option value="Yearly">Yearly</option>
        </select>
        <label>Membership Plan</label>
      </div>

      <div class="input-group" style="animation-delay: 0.5s">
        <input type="password" placeholder=" " required>
        <label>Password</label>
      </div>

      <button type="submit" style="animation-delay: 0.6s">Register</button>
    </form>
  </div>

</body>
</html>
